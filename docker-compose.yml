services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: dcnet
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dcnet_dev}
      POSTGRES_DB: dcnet
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dcnet -d dcnet"]
      interval: 5s
      timeout: 5s
      retries: 10

  fall_detection_web:
    build: ./fall_detection_web
    env_file:
      - path: ./fall_detection_web/.env
        required: false
    environment:
      DATABASE_URL: postgresql://dcnet:${DB_PASSWORD:-dcnet_dev}@postgres:5432/dcnet
    volumes:
      - fdw_data:/app/data
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  fdw_data:
