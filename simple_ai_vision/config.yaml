name: Simple AI Vision
version: "1.0.0"
slug: simple_ai_vision
description: Lightweight AI camera snapshot analyzer using go2rtc and Telegram alerts
url: "https://github.com/local/simple_ai_vision"
arch:
  - amd64
  - aarch64
startup: application
boot: auto
init: false
host_network: false
ingress: false
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: Simple AI Vision API
map:
  - addon_config:rw
options:
  go2rtc_url: "http://homeassistant.local:1984"
  ai_api_key: ""
  ai_base_url: "https://api.openai.com/v1"
  ai_model: "gpt-4o-mini"
  telegram_bot_token: ""
  telegram_chat_id: ""
  prompt: "B\u1ea1n \u0111ang ph\u00e2n t\u00edch \u1ea3nh camera an ninh.\nCh\u1ec9 m\u00f4 t\u1ea3 c\u00e1c s\u1ef1 ki\u1ec7n quan tr\u1ecdng li\u00ean quan \u0111\u1ebfn an ninh.\nN\u1ebfu kh\u00f4ng c\u00f3 g\u00ec quan tr\u1ecdng h\u00e3y tr\u1ea3 l\u1eddi NORMAL."
  keyword_match:
    - person
    - human
    - stranger
    - fire
    - smoke
    - "ng\u01b0\u1eddi"
    - "ch\u00e1y"
  ai_timeout: 30
  snapshot_timeout: 10
  telegram_timeout: 10
schema:
  go2rtc_url: url
  ai_api_key: password
  ai_base_url: url
  ai_model: str
  telegram_bot_token: password
  telegram_chat_id: str
  prompt: str
  keyword_match:
    - str
  ai_timeout: int(1,300)
  snapshot_timeout: int(1,120)
  telegram_timeout: int(1,120)
